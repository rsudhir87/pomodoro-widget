<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #161618;
    --border: #2a2a2e;
    --text: #e8e8ec;
    --muted: #5a5a6a;
    --work-color: #ff5f5f;
    --break-color: #4fc97e;
    --accent-glow: rgba(255,95,95,0.18);
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 8px;
  }

  /* ── Flip container ── */
  .flip-scene {
    width: 260px;
    perspective: 1000px;
  }

  .flip-card {
    width: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .flip-card.flipped { transform: rotateY(180deg); }

  .face {
    width: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: rgba(22, 22, 24, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }

  .face-front { padding: 20px 20px 18px; }

  .face-back {
    transform: rotateY(180deg);
    position: absolute;
    top: 0; left: 0;
    padding: 16px 16px 16px;
    min-height: 100%;
  }

  /* grid texture for both faces */
  .face::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  .face > * { position: relative; z-index: 1; }

  /* glow blob */
  .glow {
    position: absolute;
    width: 150px; height: 150px;
    border-radius: 50%;
    background: var(--accent-glow);
    filter: blur(60px);
    top: -60px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── FRONT FACE ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
  }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .session-badge {
    font-size: 11px; font-family: var(--mono);
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
  }

  .flip-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px;
    transition: all 0.2s ease;
  }
  .flip-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  .modes {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 4px;
    margin-bottom: 18px;
  }

  .mode-btn {
    flex: 1; background: none; border: none;
    color: var(--muted); font-family: var(--sans);
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.05em; padding: 7px 4px;
    border-radius: 7px; cursor: pointer;
    transition: all 0.25s ease;
  }

  .mode-btn.active { color: var(--text); background: var(--border); }

  .timer-wrap { text-align: center; margin-bottom: 32px; }

  .timer {
    font-family: var(--mono); font-size: 52px;
    font-weight: 400; line-height: 1; letter-spacing: -2px;
    color: var(--text); display: block;
    transition: color 0.4s ease;
  }

  .timer.work { color: var(--work-color); }
  .timer.brk  { color: var(--break-color); }

  .progress-bar {
    width: 100%; height: 3px;
    background: var(--border); border-radius: 2px;
    margin-top: 12px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; border-radius: 2px;
    background: var(--work-color);
    transition: width 1s linear, background 0.4s ease;
    width: 100%;
  }

  .controls {
    display: flex; gap: 10px;
    align-items: center; justify-content: center;
    margin-bottom: 14px;
  }

  .btn {
    background: none; border: 1px solid var(--border);
    color: var(--text); border-radius: 12px; cursor: pointer;
    font-family: var(--sans); font-weight: 700;
    transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center;
  }

  .btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

  .btn-main {
    width: 100%; padding: 10px;
    font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
    background: var(--work-color); border: none;
    color: #0e0e10; border-radius: 12px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 24px rgba(255,95,95,0.25);
    position: relative; overflow: hidden;
  }

  .btn-main::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.15) 1px, transparent 1px);
    background-size: 12px 12px;
    border-radius: 12px;
    pointer-events: none;
  }

  .btn-main span { position: relative; z-index: 1; }

  .btn-main:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,95,95,0.35); }

  .btn-main.brk {
    background: var(--break-color);
    box-shadow: 0 4px 24px rgba(79,201,126,0.25);
  }
  .btn-main.brk:hover { box-shadow: 0 6px 28px rgba(79,201,126,0.35); }

  .btn-icon { width: 34px; height: 34px; font-size: 14px; flex-shrink: 0; }

  .stats {
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 12px; gap: 8px;
  }

  .stat { text-align: center; flex: 1; }

  .stat-value {
    font-family: var(--mono); font-size: 17px;
    font-weight: 400; color: var(--text); display: block;
  }

  .stat-label {
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-top: 2px;
  }

  .divider { width: 1px; background: var(--border); align-self: stretch; }

  .stats-footer { display: flex; justify-content: flex-end; margin-top: 12px; }

  .btn-reset-stats {
    background: none; border: none; color: var(--muted);
    font-family: var(--sans); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; padding: 4px 0;
    transition: color 0.2s ease;
    display: flex; align-items: center; gap: 5px;
  }

  .btn-reset-stats:hover { color: #ff5f5f; }

  /* Confirm overlay */
  .confirm-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(14,14,16,0.92); border-radius: 16px;
    z-index: 10; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    backdrop-filter: blur(4px);
  }

  .confirm-overlay.show { display: flex; }

  .confirm-text { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; text-align: center; }
  .confirm-sub  { font-size: 11px; color: var(--muted); margin-top: -4px; text-align: center; }
  .confirm-btns { display: flex; gap: 8px; margin-top: 8px; }

  .confirm-yes {
    background: #ff5f5f; border: none; color: #0e0e10;
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 20px; border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
  }
  .confirm-yes:hover { opacity: 0.85; }

  .confirm-no {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .confirm-no:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  @keyframes tick {
    0%,49% { opacity: 1; }
    50%,100% { opacity: 0.4; }
  }
  .ticking .colon { animation: tick 1s step-start infinite; }

  .btn-main.running { animation: pulse-ring 2s ease-out infinite; }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255,95,95,0.25); }
    70%  { box-shadow: 0 0 0 10px rgba(255,95,95,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,95,95,0); }
  }

  /* ── BACK FACE — Database ── */
  .db-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 18px;
  }

  .db-title { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  .db-tabs {
    display: flex; gap: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px; padding: 3px;
    margin-bottom: 16px;
  }

  .db-tab {
    flex: 1; background: none; border: none;
    color: var(--muted); font-family: var(--sans);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.04em; padding: 6px 4px;
    border-radius: 6px; cursor: pointer;
    transition: all 0.2s ease;
  }
  .db-tab.active { color: var(--text); background: var(--border); }

  .db-panel { display: none; }
  .db-panel.active { display: block; }

  /* Tasks panel */
  .task-input-row {
    display: flex; gap: 6px; margin-bottom: 12px;
  }

  .task-input {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--sans);
    font-size: 12px; padding: 8px 10px; outline: none;
    transition: border-color 0.2s;
  }
  .task-input::placeholder { color: var(--muted); }
  .task-input:focus { border-color: rgba(255,255,255,0.2); }

  .task-add-btn {
    background: var(--break-color); border: none;
    color: #0e0e10; border-radius: 8px;
    width: 34px; font-size: 18px; cursor: pointer;
    transition: opacity 0.2s; flex-shrink: 0;
  }
  .task-add-btn:hover { opacity: 0.85; }

  .task-list { max-height: 220px; overflow-y: auto; }
  .task-list::-webkit-scrollbar { width: 3px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px; border-bottom: 1px solid rgba(42,42,46,0.5);
    transition: opacity 0.2s;
  }
  .task-item.done { opacity: 0.4; }

  .task-check {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1px solid var(--border); background: none;
    cursor: pointer; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 10px;
  }
  .task-check.checked { background: var(--break-color); border-color: var(--break-color); color: #0e0e10; }

  .task-text { flex: 1; font-size: 12px; color: var(--text); line-height: 1.3; }
  .task-item.done .task-text { text-decoration: line-through; }

  .task-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 0 2px;
    transition: color 0.2s; flex-shrink: 0;
  }
  .task-del:hover { color: #ff5f5f; }

  .task-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 24px 0; }

  /* Logs panel */
  .log-list { max-height: 260px; overflow-y: auto; }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-row {
    display: grid; grid-template-columns: 1fr auto auto auto;
    gap: 6px; align-items: center;
    padding: 8px 4px; border-bottom: 1px solid rgba(42,42,46,0.5);
    font-size: 11px;
  }

  .log-date { font-family: var(--mono); color: var(--muted); font-size: 10px; }
  .log-chip {
    font-family: var(--mono); font-size: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 2px 7px; color: var(--text); white-space: nowrap;
  }
  .log-chip.green { border-color: rgba(79,201,126,0.3); color: var(--break-color); }

  .log-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 24px 0; }

  /* Weekly panel */
  .week-grid {
    display: grid; grid-template-columns: repeat(7,1fr);
    gap: 4px; margin-bottom: 20px;
  }

  .week-day { text-align: center; }
  .week-day-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }

  .week-bar-wrap { height: 60px; display: flex; align-items: flex-end; justify-content: center; }
  .week-bar {
    width: 14px; background: rgba(79,201,126,0.2);
    border-radius: 3px 3px 0 0;
    border: 1px solid rgba(79,201,126,0.3);
    min-height: 4px; transition: height 0.4s ease;
  }
  .week-bar.today { background: var(--break-color); border-color: var(--break-color); }

  .week-val { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 3px; }

  .week-summary {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 8px; border-top: 1px solid var(--border); padding-top: 14px;
  }

  .week-stat { text-align: center; }
  .week-stat-val { font-family: var(--mono); font-size: 18px; color: var(--text); display: block; }
  .week-stat-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="flip-scene">
  <div class="flip-card" id="flipCard">

    <!-- ══ FRONT ══ -->
    <div class="face face-front">
      <div class="glow" id="glow"></div>

      <div class="confirm-overlay" id="confirmOverlay">
        <span class="confirm-text">Reset all stats?</span>
        <span class="confirm-sub">Pomos, focus time & streak will be cleared.</span>
        <div class="confirm-btns">
          <button class="confirm-yes" onclick="confirmReset()">Reset</button>
          <button class="confirm-no" onclick="cancelReset()">Cancel</button>
        </div>
      </div>

      <div class="header">
        <span class="label">Pomodoro</span>
        <div class="header-right">
          <span class="session-badge" id="sessionBadge">session #1</span>
          <button class="flip-btn" onclick="flipToBack()" title="Open database">⊞</button>
        </div>
      </div>

      <div class="modes">
        <button class="mode-btn active" onclick="setMode('work')">Focus</button>
        <button class="mode-btn" onclick="setMode('short')">Short Break</button>
        <button class="mode-btn" onclick="setMode('long')">Long Break</button>
      </div>

      <div class="timer-wrap">
        <span class="timer" id="timerDisplay">25<span class="colon">:</span>00</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div class="controls">
        <button class="btn btn-icon" onclick="resetTimer()" title="Reset">↺</button>
        <button class="btn btn-main" id="mainBtn" onclick="toggleTimer()"><span>START</span></button>
        <button class="btn btn-icon" onclick="skipTimer()" title="Skip">⏭</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="statPomos">0</span>
          <span class="stat-label">Pomos</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-value" id="statFocus">0m</span>
          <span class="stat-label">Focus</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-value" id="statStreak">0</span>
          <span class="stat-label">Streak</span>
        </div>
      </div>
      <div class="stats-footer">
        <button class="btn-reset-stats" onclick="askResetStats()">⊘ Reset stats</button>
      </div>
    </div>

    <!-- ══ BACK ══ -->
    <div class="face face-back">
      <div class="db-header">
        <span class="db-title">Database</span>
        <button class="flip-btn" onclick="flipToFront()" title="Back to timer">✕</button>
      </div>

      <div class="db-tabs">
        <button class="db-tab active" onclick="switchTab('tasks')">Tasks</button>
        <button class="db-tab" onclick="switchTab('logs')">Session Logs</button>
        <button class="db-tab" onclick="switchTab('weekly')">Weekly</button>
      </div>

      <!-- Tasks -->
      <div class="db-panel active" id="panel-tasks">
        <div class="task-input-row">
          <input class="task-input" id="taskInput" type="text" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
          <button class="task-add-btn" onclick="addTask()">+</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>

      <!-- Logs -->
      <div class="db-panel" id="panel-logs">
        <div class="log-list" id="logList"></div>
      </div>

      <!-- Weekly -->
      <div class="db-panel" id="panel-weekly">
        <div class="week-grid" id="weekGrid"></div>
        <div class="week-summary" id="weekSummary"></div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── State ──
  const MODES = {
    work:  { duration: 25 * 60 },
    short: { duration: 5 * 60  },
    long:  { duration: 15 * 60 },
  };

  let mode = 'work', timeLeft = MODES.work.duration, totalTime = MODES.work.duration;
  let running = false, interval = null;
  let sessions = 0, focusMins = 0, streak = 0;

  let tasks = JSON.parse(localStorage.getItem('pomo_tasks') || '[]');
  let logs  = JSON.parse(localStorage.getItem('pomo_logs')  || '[]');

  const timerEl = document.getElementById('timerDisplay');
  const mainBtn = document.getElementById('mainBtn');
  const fillEl  = document.getElementById('progressFill');
  const glowEl  = document.getElementById('glow');
  const badgeEl = document.getElementById('sessionBadge');

  function pad(n) { return String(n).padStart(2,'0'); }

  function setBtnText(t) {
    const s = mainBtn.querySelector('span');
    if (s) s.textContent = t; else mainBtn.textContent = t;
  }

  // ── Timer logic ──
  function setMode(m) {
    if (running) return;
    mode = m; timeLeft = MODES[m].duration; totalTime = MODES[m].duration;
    updateDisplay(); updateTheme();
    document.querySelectorAll('.mode-btn').forEach((b,i) =>
      b.classList.toggle('active', ['work','short','long'][i] === m));
  }

  function updateTheme() {
    const isWork = mode === 'work';
    const color  = isWork ? '#ff5f5f' : '#4fc97e';
    const glow   = isWork ? 'rgba(255,95,95,0.18)' : 'rgba(79,201,126,0.18)';
    document.documentElement.style.setProperty('--accent', color);
    fillEl.style.background = isWork ? 'var(--work-color)' : 'var(--break-color)';
    glowEl.style.background = glow;
    mainBtn.className = 'btn btn-main' + (mode !== 'work' ? ' brk' : '') + (running ? ' running' : '');
    timerEl.className = 'timer' + (running ? (isWork ? ' work ticking' : ' brk ticking') : '');
  }

  function updateDisplay() {
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    timerEl.innerHTML = `${pad(m)}<span class="colon">:</span>${pad(s)}`;
    fillEl.style.width = (timeLeft/totalTime*100) + '%';
  }

  function toggleTimer() { running ? pauseTimer() : startTimer(); }

  function startTimer() {
    running = true; setBtnText('PAUSE'); updateTheme();
    interval = setInterval(() => {
      if (timeLeft <= 0) { completeSession(); return; }
      timeLeft--; updateDisplay();
    }, 1000);
  }

  function pauseTimer() {
    running = false; clearInterval(interval);
    setBtnText('RESUME'); updateTheme();
    timerEl.classList.remove('ticking','work','brk');
  }

  function resetTimer() {
    clearInterval(interval); running = false;
    timeLeft = totalTime = MODES[mode].duration;
    setBtnText('START');
    updateDisplay(); updateTheme();
    timerEl.classList.remove('ticking','work','brk');
  }

  function skipTimer() { completeSession(); }

  function completeSession() {
    clearInterval(interval); running = false;
    if (mode === 'work') {
      const mins = Math.round((totalTime - timeLeft) / 60) || 25;
      sessions++; focusMins += mins; streak++;
      document.getElementById('statPomos').textContent  = sessions;
      document.getElementById('statFocus').textContent  = focusMins + 'm';
      document.getElementById('statStreak').textContent = streak;
      badgeEl.textContent = `session #${sessions + 1}`;

      // Log the session
      const now = new Date();
      logs.push({ date: now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}), time: now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}), pomos: 1, mins });
      localStorage.setItem('pomo_logs', JSON.stringify(logs));
      renderLogs(); renderWeekly();

      setMode(sessions % 4 === 0 ? 'long' : 'short');
    } else {
      setMode('work');
    }
    setBtnText('START'); updateDisplay();
  }

  // ── Stats reset ──
  function askResetStats() { document.getElementById('confirmOverlay').classList.add('show'); }
  function cancelReset()   { document.getElementById('confirmOverlay').classList.remove('show'); }
  function confirmReset() {
    sessions = focusMins = streak = 0;
    document.getElementById('statPomos').textContent  = 0;
    document.getElementById('statFocus').textContent  = '0m';
    document.getElementById('statStreak').textContent = 0;
    badgeEl.textContent = 'session #1';
    document.getElementById('confirmOverlay').classList.remove('show');
  }

  // ── Flip ──
  function flipToBack()  { document.getElementById('flipCard').classList.add('flipped'); renderWeekly(); }
  function flipToFront() { document.getElementById('flipCard').classList.remove('flipped'); }

  // ── DB Tabs ──
  function switchTab(tab) {
    document.querySelectorAll('.db-tab').forEach((b,i) =>
      b.classList.toggle('active', ['tasks','logs','weekly'][i] === tab));
    document.querySelectorAll('.db-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
    if (tab === 'weekly') renderWeekly();
  }

  // ── Tasks ──
  function saveTasks() { localStorage.setItem('pomo_tasks', JSON.stringify(tasks)); }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim(); if (!text) return;
    tasks.push({ id: Date.now(), text, done: false, date: new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) });
    input.value = ''; saveTasks(); renderTasks();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id); if (t) t.done = !t.done;
    saveTasks(); renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks(); renderTasks();
  }

  function renderTasks() {
    const el = document.getElementById('taskList');
    if (!tasks.length) { el.innerHTML = '<div class="task-empty">No tasks yet. Add one above!</div>'; return; }
    el.innerHTML = tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">${t.done ? '✓' : ''}</div>
        <span class="task-text">${t.text}</span>
        <button class="task-del" onclick="deleteTask(${t.id})">×</button>
      </div>`).join('');
  }

  // ── Logs ──
  function renderLogs() {
    const el = document.getElementById('logList');
    if (!logs.length) { el.innerHTML = '<div class="log-empty">No sessions logged yet.</div>'; return; }
    el.innerHTML = [...logs].reverse().map(l => `
      <div class="log-row">
        <span class="log-date">${l.date} ${l.time}</span>
        <span class="log-chip">🍅 ${l.pomos}</span>
        <span class="log-chip green">${l.mins}m</span>
      </div>`).join('');
  }

  // ── Weekly ──
  function renderWeekly() {
    const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const today = new Date().getDay();
    const weekMins = Array(7).fill(0);
    const weekPomos = Array(7).fill(0);

    // Map logs to this week
    const now = new Date();
    logs.forEach(l => {
      const parts = l.date.split(' ');
      // approximate: just distribute evenly for demo, real use would parse full date
    });

    // Use session data distributed across days (demo: today gets current sessions)
    weekMins[today]  = focusMins;
    weekPomos[today] = sessions;

    const maxMins = Math.max(...weekMins, 1);

    document.getElementById('weekGrid').innerHTML = days.map((d,i) => `
      <div class="week-day">
        <div class="week-day-label">${d}</div>
        <div class="week-bar-wrap">
          <div class="week-bar ${i===today?'today':''}" style="height:${Math.max(4, weekMins[i]/maxMins*56)}px"></div>
        </div>
        <div class="week-val">${weekMins[i] ? weekMins[i]+'m' : ''}</div>
      </div>`).join('');

    const totalWeekPomos = weekPomos.reduce((a,b)=>a+b,0);
    const totalWeekMins  = weekMins.reduce((a,b)=>a+b,0);
    const activeDays     = weekMins.filter(m=>m>0).length;

    document.getElementById('weekSummary').innerHTML = `
      <div class="week-stat"><span class="week-stat-val">${totalWeekPomos}</span><span class="week-stat-label">Pomos</span></div>
      <div class="week-stat"><span class="week-stat-val">${totalWeekMins}m</span><span class="week-stat-label">Focus</span></div>
      <div class="week-stat"><span class="week-stat-val">${activeDays}</span><span class="week-stat-label">Days</span></div>`;
  }

  // ── Init ──
  updateDisplay(); updateTheme(); renderTasks(); renderLogs(); renderWeekly();
</script>
</body>
</html>
