<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pomodoro Widget</title>

  <!-- Aesthetic font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Minimal dark palette */
      --bg: #0b1220;        /* deep slate */
      --panel: #0f172a;     /* slate-900 */
      --text: #e5e7eb;      /* gray-200 */
      --muted: #94a3b8;     /* slate-400 */
      --accent: #22c55e;    /* green-500 */
      --accent-2: #3b82f6;  /* blue-500 */
      --warn: #f59e0b;      /* amber-500 */
      --danger: #ef4444;    /* red-500 */

      --radius: 12px;
      --shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display:grid; place-items:center; min-height:100vh;
    }
    .wrap{
      width:min(560px, 94vw);
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    h1{
      margin:0 0 6px; font-size:1rem; font-weight:600; text-align:center; opacity:.85;
      letter-spacing:.2px;
    }
    .time{
      font-size:3.4rem; font-weight:700; text-align:center; letter-spacing:1.2px;
    }
    .status{
      text-align:center; margin:4px 0 10px; color:var(--muted); font-size:.9rem;
    }

    /* Single-row minimalist controls */
    .row{
      display:flex; justify-content:center; align-items:center;
      gap:6px; margin:10px 0 8px; flex-wrap:nowrap;
    }
    .btn{
      border:none; border-radius:10px;
      padding:6px 10px; font-size:0.92rem; line-height:1; font-weight:600;
      background:#1f2937; color:#e5e7eb; cursor:pointer;
      transition:transform .08s ease, filter .12s ease, background .12s ease;
      min-width:40px;
    }
    .btn:hover{ filter:brightness(1.1); }
    .btn:active{ transform:translateY(1px); }
    .btn:disabled{ opacity:.5; cursor:not-allowed; }

    .primary{ background:var(--accent); color:#0b1220; }
    .secondary{ background:#1f2937; }
    .warn{ background:var(--warn); color:#0b1220; }
    .danger{ background:var(--danger); }

    /* Compact config */
    .cfg{
      display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:6px 0 2px;
    }
    label{
      color:var(--muted); font-size:.9rem; display:inline-flex; align-items:center; gap:6px;
    }
    input[type="number"], select{
      border:none; border-radius:10px; padding:6px 10px; background:#1f2937; color:#e5e7eb;
      width:70px; text-align:center;
    }

    /* Session dots */
    .grid{
      display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; margin-top:8px;
    }
    .dot{ height:8px; border-radius:6px; background:#1f2937; opacity:.75; }
    .dot.on{ background:var(--accent); opacity:1; }

    /* Toggles (minimal) */
    .toggles{
      display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:8px;
    }
    .toggle label{ color:var(--muted); font-size:.9rem; display:inline-flex; align-items:center; gap:6px; }
    .toggle input[type="checkbox"]{ accent-color: var(--accent); width:16px; height:16px; }

    .note{
      text-align:center; font-size:.8rem; opacity:.6; margin-top:8px;
    }
    code{ color:#cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pomodoro</h1>
    <div id="time" class="time">25:00</div>
    <div id="status" class="status">Focus</div>

    <!-- Minimal single-row controls (icon buttons) -->
    <div class="row">
      <button id="start" class="btn primary" title="Start">▶︎</button>
      <button id="pause" class="btn warn" title="Pause" disabled>Ⅱ</button>
      <button id="reset" class="btn danger" title="Reset">↺</button>
      <button id="skip" class="btn secondary" title="Skip">⏭</button>
    </div>

    <!-- Compact config -->
    <div class="cfg">
      <label>Focus <input id="focusMin" type="number" min="1" max="180" value="25"> min</label>
      <label>Break <input id="breakMin" type="number" min="1" max="60" value="5"> min</label>
      <label>Long <input id="longMin" type="number" min="1" max="60" value="15"> min</label>
      <label>Long after <input id="cyclesNum" type="number" min="1" max="10" value="4"> cycles</label>
    </div>

    <!-- Progress dots -->
    <div class="grid" id="cycles">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <!-- Minimal toggles (sound, notifications, auto-continue) -->
    <div class="toggles">
      <div class="toggle"><label><input id="soundToggle" type="checkbox" checked> Sound</label></div>
      <div class="toggle"><label><input id="notifyToggle" type="checkbox"> Desktop notification</label></div>
      <div class="toggle"><label><input id="autostartToggle" type="checkbox" checked> Auto-continue</label></div>
    </div>

    <div class="note">
      Settings persist • URL params: <code>?focus=25&break=5&long=15&cycles=4&autostart=1</code>
    </div>
  </div>

  <script>
    // ---- DOM ----
    const timeEl = document.getElementById('time');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('start');
    const pauseBtn = document.getElementById('pause');
    const resetBtn = document.getElementById('reset');
    const skipBtn = document.getElementById('skip');
    const focusMin = document.getElementById('focusMin');
    const breakMin = document.getElementById('breakMin');
    const longMin  = document.getElementById('longMin');
    const cyclesNum= document.getElementById('cyclesNum');
    const dots = [...document.querySelectorAll('#cycles .dot')];

    const soundToggle = document.getElementById('soundToggle');
    const notifyToggle= document.getElementById('notifyToggle');
    const autostartToggle = document.getElementById('autostartToggle');

    // ---- State ----
    let mode = 'focus';           // 'focus' | 'break' | 'long'
    let total = 25 * 60;          // seconds
    let left = total;
    let timer = null;
    let startTs = null;           // for drift compensation
    let completedFocus = 0;

    // ---- Utils ----
    const fmt = (n) => {
      const m = Math.floor(n / 60), s = n % 60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    };
    const clamp = (n, min, max) => Math.min(Math.max(n, min), max);

    function loadPrefs(){
      const p = JSON.parse(localStorage.getItem('pomo:prefs') || '{}');
      if (p.focus)   focusMin.value   = p.focus;
      if (p.break)   breakMin.value   = p.break;
      if (p.long)    longMin.value    = p.long;
      if (p.cycles)  cyclesNum.value  = p.cycles;
      if (p.sound !== undefined)      soundToggle.checked    = !!p.sound;
      if (p.notify !== undefined)     notifyToggle.checked   = !!p.notify;
      if (p.autostart !== undefined)  autostartToggle.checked= !!p.autostart;
    }
    function savePrefs(){
      const p = {
        focus:  clamp(Number(focusMin.value), 1, 180),
        break:  clamp(Number(breakMin.value), 1, 60),
        long:   clamp(Number(longMin.value),  1, 60),
        cycles: clamp(Number(cyclesNum.value),1, 10),
        sound:  soundToggle.checked,
        notify: notifyToggle.checked,
        autostart: autostartToggle.checked
      };
      localStorage.setItem('pomo:prefs', JSON.stringify(p));
    }
    function applyURLParams(){
      const params = new URLSearchParams(location.search);
      if (params.has('focus'))  focusMin.value  = params.get('focus');
      if (params.has('break'))  breakMin.value  = params.get('break');
      if (params.has('long'))   longMin.value   = params.get('long');
      if (params.has('cycles')) cyclesNum.value = params.get('cycles');
      if (params.get('autostart') === '1') autostartToggle.checked = true;
    }

    // ---- Audio (WebAudio beep) ----
    function beep(freq = 880, durMs = 220){
      if (!soundToggle.checked) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0.06;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start();
        setTimeout(()=>{ osc.stop(); ctx.close(); }, durMs);
      } catch(e){}
    }

    // ---- Notifications ----
    async function ensureNotify(){
      if (!notifyToggle.checked) return false;
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'granted') return true;
      const res = await Notification.requestPermission();
      return res === 'granted';
    }
    function notify(title, body){
      if (!notifyToggle.checked || !('Notification' in window) || Notification.permission !== 'granted') return;
      try { new Notification(title, { body }); } catch(e){}
    }

    // ---- Mode / timer ----
    function setMode(next){
      mode = next;
      const f = clamp(Number(focusMin.value), 1, 180);
      const b = clamp(Number(breakMin.value), 1, 60);
      const l = clamp(Number(longMin.value),  1, 60);
      if (mode === 'focus') total = f * 60;
      else if (mode === 'break') total = b * 60;
      else total = l * 60;
      left = total;
      statusEl.textContent = mode === 'focus' ? 'Focus' : (mode==='break' ? 'Break' : 'Long break');
      timeEl.textContent = fmt(left);
      savePrefs();
    }
    function updateDots(){
      const cycles = clamp(Number(cyclesNum.value), 1, 10);
      dots.forEach((d,i)=>{ d.classList.toggle('on', i < (completedFocus % cycles)); });
    }
    function start(){
      startBtn.disabled = true; pauseBtn.disabled = false;
      startTs = performance.now();
      timer = setInterval(tick, 250); // smoother countdown & reduced drift
    }
    function pause(){
      startBtn.disabled = false; pauseBtn.disabled = true;
      clearInterval(timer); timer = null;
    }
    function reset(){
      pause();
      completedFocus = 0; updateDots();
      setMode('focus');
    }
    function skip(){ left = 0; tick(); }

    function tick(){
      // drift compensation via elapsed time since start
      const elapsedSec = Math.floor((performance.now() - startTs) / 1000);
      left = Math.max(0, total - elapsedSec);
      timeEl.textContent = fmt(left);
      if (left === 0){
        pause();
        // chime + notify
        beep(880, 200); beep(660, 200);
        ensureNotify().then(()=>{
          const label = mode === 'focus' ? 'Focus complete' : (mode==='break' ? 'Break over' : 'Long break over');
          notify(label, 'Starting next block…');
        });
        // next segment
        if (mode === 'focus'){
          completedFocus++;
          updateDots();
          const cycles = clamp(Number(cyclesNum.value), 1, 10);
          if (completedFocus % cycles === 0){ setMode('long'); }
          else { setMode('break'); }
        } else {
          setMode('focus');
        }
        if (autostartToggle.checked){ start(); }
      }
    }

    // ---- Events ----
    focusMin.onchange = breakMin.onchange = longMin.onchange = cyclesNum.onchange = savePrefs;
    soundToggle.onchange = notifyToggle.onchange = autostartToggle.onchange = savePrefs;
    startBtn.onclick = start;
    pauseBtn.onclick = pause;
    resetBtn.onclick = reset;
    skipBtn.onclick = skip;

    // ---- Init ----
    loadPrefs(); applyURLParams();
    setMode('focus'); updateDots();
  </script>
</body>
</html>
